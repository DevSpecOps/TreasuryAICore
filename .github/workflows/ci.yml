name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build all images
        run: docker compose build
      - name: Run containers
        run: docker compose up -d
      - name: Wait for services
        run: sleep 10
      - name: Test health endpoints
        run: |
          curl -f http://localhost:8080/api/v1/auth/health
          curl -f http://localhost:8081/api/v1/payment/health
          curl -f http://localhost:8082/api/v1/notification/health
      - name: Run unit tests (example)
        run: |
          cd services/auth-service && mvn test